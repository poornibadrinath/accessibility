<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Last Mile Connectivity: Understanding Point to Point Navigation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="https://api.tiles.mapbox.com/mapbox-gl-js/v2.6.1/mapbox-gl.js"></script>
  <link href="https://api.tiles.mapbox.com/mapbox-gl-js/v2.6.1/mapbox-gl.css" rel="stylesheet" />

  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-directions/v4.1.0/mapbox-gl-directions.js"></script>
  <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-directions/v4.1.0/mapbox-gl-directions.css" />

  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.0.9/mapbox-gl-draw.js"></script>
  <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.0.9/mapbox-gl-draw.css" />

  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v4.7.2/mapbox-gl-geocoder.min.js"></script>
  <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v4.7.2/mapbox-gl-geocoder.css" />

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }

    #map {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 100%;
    }

    #layer-menu {
      background: #fff;
      position: absolute;
      z-index: 2;
      top: 120px;
      right: 10px;
      border-radius: 3px;
      width: 130px;
      border: 1px solid rgba(0, 0, 0, 0.4);
      font-family: 'Open Sans', sans-serif;
    }

    #layer-menu a {
      font-size: 10px;
      color: #404040;
      display: block;
      padding: 10px;
      text-decoration: none;
      border-bottom: 1px solid rgba(0, 0, 0, 0.25);
      text-align: center;
    }

    #layer-menu a:last-child {
      border: none;
    }

    #layer-menu a:hover {
      background-color: #f8f8f8;
    }

    #layer-menu a.active {
      background-color: #3887be;
      color: #ffffff;
    }

    #toggle {
      position: fixed;
      background: #2b667e;
      z-index: 1000;
      display: block;
      margin: 0;
      padding: 8px;
      border: 2px solid rgba(8, 67, 90, 0.4);
      font-family: calibri, sans-serif;
      color: white;
    }

    #legend {
      position: fixed;
      padding: 10px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
      line-height: 18px;
      height: 120px;
      margin-bottom: 10px;
      width: 200px;
      bottom: 20px;
      left: 10px;
      background-color: #eceef1e5;
      z-index: 2;
    }

    .legend-key {
      display: inline-block;
      border-radius: 20%;
      width: 10px;
      height: 10px;
      margin-right: 5px;
    }

    .info-box {
      position: fixed;
      margin: 20px;
      width: 25%;
      top: 30px;
      max-height: 250px;
      padding: 10px;
      background-color: #ffffffa8;
      overflow-y: auto;
      z-index: 2;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <nav id="layer-menu"></nav>

  <div id="toggle">
    <input id="ckyu1koq5001615pq10qss11j" type="radio" name="rtoggle" checked>
    <label>Day</label>

    <input id="ckyvs9vi2003s14o4r353jqhh" type="radio" name="rtoggle">
    <label>Night</label>

    <input id="cmr8x7uxi000101qw734mesbf" type="radio" name="rtoggle">
    <label>Blue</label>

    <input id="cjes38rm70gdq2snurl4fercr" type="radio" name="rtoggle">
    <label>Candyland</label>
  </div>

  <div class="info-box">
    <p>
      Click on the map at the desired locations for the OpenStreetMap API to query and display the route!
    </p>
    <p>Happy Exploring!!!</p>
    <div id="directions"></div>
  </div>

  <div class="map-overlay" id="legend"></div>

  <script>
    mapboxgl.accessToken = 'pk.eyJ1IjoicG9vcm5pLWJhZHJpbmF0aCIsImEiOiJjbXI0ejAzdHIwY3UxNDhzampibmkwdmtiIn0.jICjb-T8m48aSQX34yc9kw';

    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/poorni-badrinath/ckyu1koq5001615pq10qss11j',
      center: [12.8545315, 48.4793267],
      zoom: 1
    });

    const popup = new mapboxgl.Popup({ closeOnClick: false })
      .setLngLat([12.8545315, 48.4793267])
      .setHTML(`
        <h2>Understanding Last Mile Connectivity!</h2>
        <p>
          Last Mile Connectivity is ensuring that the user has precise directions from the origin to destination,
          factoring in all modes of transport as well as walking instructions to the origin point and destination point.
        </p>
      `)
      .addTo(map);

    map.addControl(
      new MapboxGeocoder({
        accessToken: mapboxgl.accessToken,
        mapboxgl: mapboxgl,
        marker: true
      }),
      'top-right'
    );

    map.addControl(new mapboxgl.FullscreenControl());

    map.addControl(
      new MapboxDirections({
        accessToken: mapboxgl.accessToken
      }),
      'bottom-right'
    );

    const draw = new MapboxDraw({
      displayControlsDefault: false,
      controls: {
        line_string: true,
        trash: true
      },
      defaultMode: 'draw_line_string'
    });

    map.addControl(draw);

    map.on('draw.create', updateRoute);
    map.on('draw.update', updateRoute);
    map.on('draw.delete', removeRoute);

    function updateRoute() {
      removeRoute();

      const profile = 'walking';
      const data = draw.getAll();

      if (!data.features.length) return;

      const lastFeature = data.features.length - 1;
      const coords = data.features[lastFeature].geometry.coordinates;

      const newCoords = coords.join(';');
      const radius = coords.map(() => 25);

      getMatch(newCoords, radius, profile);
    }

    async function getMatch(coordinates, radius, profile) {
      const radiuses = radius.join(';');

      const query = await fetch(
        `https://api.mapbox.com/matching/v5/mapbox/${profile}/${coordinates}?geometries=geojson&radiuses=${radiuses}&steps=true&access_token=${mapboxgl.accessToken}`
      );

      const response = await query.json();

      if (response.code !== 'Ok') {
        alert(`${response.code} - ${response.message}`);
        return;
      }

      const coords = response.matchings[0].geometry;
      addRoute(coords);
      getInstructions(response.matchings[0]);
    }

    function getInstructions(data) {
      const directions = document.getElementById('directions');
      let tripDirections = '';

      for (const leg of data.legs) {
        for (const step of leg.steps) {
          tripDirections += `<li>${step.maneuver.instruction}</li>`;
        }
      }

      directions.innerHTML = `
        <p><strong>Trip duration: ${Math.floor(data.duration / 60)} min.</strong></p>
        <ol>${tripDirections}</ol>
      `;
    }

    function addRoute(coords) {
      if (map.getSource('route')) {
        map.removeLayer('route');
        map.removeSource('route');
      }

      map.addLayer({
        id: 'route',
        type: 'line',
        source: {
          type: 'geojson',
          data: {
            type: 'Feature',
            properties: {},
            geometry: coords
          }
        },
        layout: {
          'line-join': 'round',
          'line-cap': 'round'
        },
        paint: {
          'line-color': '#03AA46',
          'line-width': 8,
          'line-opacity': 0.8
        }
      });
    }

    function removeRoute() {
      if (!map.getSource('route')) return;
      map.removeLayer('route');
      map.removeSource('route');
    }

    function addCustomLayers() {
      if (!map.getSource('steps')) {
        map.addSource('steps', {
          type: 'vector',
          url: 'mapbox://poorni-badrinath.ckv9d1um40ape23nsylhvugpt-3jpjf'
        });

        map.addLayer({
          id: 'steps',
          type: 'line',
          source: 'steps',
          'source-layer': 'stepsandramps',
          layout: {
            visibility: 'none',
            'line-join': 'round',
            'line-cap': 'round'
          },
          paint: {
            'line-color': '#D35400',
            'line-width': 3,
            'line-dasharray': [1, 3]
          }
        });
      }

      if (!map.getSource('wheelchairaccess')) {
        map.addSource('wheelchairaccess', {
          type: 'vector',
          url: 'mapbox://poorni-badrinath.ckyw5g4b81gfv21p6r5ggwd35-56ub5'
        });

        map.addLayer({
          id: 'wheelchairaccess',
          type: 'circle',
          source: 'wheelchairaccess',
          'source-layer': 'wheelchairyes',
          layout: {
            visibility: 'none'
          },
          paint: {
            'circle-radius': 2,
            'circle-color': '#7D3C98'
          }
        });
      }
    }

    map.on('load', () => {
      addCustomLayers();
      createLayerToggle();
    });

    map.on('style.load', () => {
      addCustomLayers();
    });

    function createLayerToggle() {
      const toggleableLayerIds = ['wheelchairaccess', 'steps'];
      const layerMenu = document.getElementById('layer-menu');

      for (const id of toggleableLayerIds) {
        if (document.getElementById(id)) continue;

        const link = document.createElement('a');
        link.id = id;
        link.href = '#';
        link.textContent = id;
        link.className = '';

        link.onclick = function (e) {
          e.preventDefault();
          e.stopPropagation();

          const clickedLayer = this.textContent;
          const visibility = map.getLayoutProperty(clickedLayer, 'visibility');

          if (visibility === 'visible') {
            map.setLayoutProperty(clickedLayer, 'visibility', 'none');
            this.className = '';
          } else {
            map.setLayoutProperty(clickedLayer, 'visibility', 'visible');
            this.className = 'active';
          }
        };

        layerMenu.appendChild(link);
      }
    }

    const legendLayers = [
      'Blue Route - Mapbox Directions',
      'Green Route - OSM API',
      'Purple Dots - Wheelchair Data',
      'Orange Lines - Steps and Ramps'
    ];

    const colors = [
      '#2E86C1',
      '#1E8449',
      '#6C3483',
      '#D35400'
    ];

    const legend = document.getElementById('legend');

    legendLayers.forEach((layer, i) => {
      const item = document.createElement('div');
      const key = document.createElement('span');
      key.className = 'legend-key';
      key.style.backgroundColor = colors[i];

      const value = document.createElement('span');
      value.innerHTML = layer;

      item.appendChild(key);
      item.appendChild(value);
      legend.appendChild(item);
    });

    const layerList = document.getElementById('toggle');
    const inputs = layerList.getElementsByTagName('input');

    for (const input of inputs) {
      input.onclick = (layer) => {
        const layerId = layer.target.id;
        map.setStyle('mapbox://styles/poorni-badrinath/' + layerId);
      };
    }
  </script>
</body>
</html>
