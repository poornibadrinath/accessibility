<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Load data from an external GeoJSON file</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
<link href="https://api.mapbox.com/mapbox-gl-js/v2.5.1/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v2.5.1/mapbox-gl.js"></script>
<style>
body { margin: 0; padding: 0; }
#map { position: absolute; top: 0; bottom: 0; width: 100%; }
</style>
</head>
<body>
<script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-directions/v4.1.0/mapbox-gl-directions.js"></script>
<link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-directions/v4.1.0/mapbox-gl-directions.css" type="text/css">
<div id="map"></div>

<script>
	mapboxgl.accessToken = 'pk.eyJ1IjoicG9vcm5pLWJhZHJpbmF0aCIsImEiOiJjanUwbmYzc3UwdDI3NGRtZ3kzMTltbWZpIn0.SB9PEksVcEwWvZJ9A7J9uA';
    const map = new mapboxgl.Map({
        container: 'map', // container ID
        style: 'mapbox://styles/poorni-badrinath/cjnc2au8s0bwg2so0xni4jj9h', // style URL
        zoom: 8, // starting zoom
        center: [11.5765, 48.1452] // starting center
    });

    map.on('load', () => {
        map.addSource('stepsandrampsM', {
            type: 'geojson',
            // Use a URL for the value for the `data` property.
            data: 'gs://steps_ramps/stepsandrampsM.geojson'
        });

        map.addLayer({
            'id': 'stepsandrampsM-layer',
            'type': 'circle',
            'source': 'stepsandrampsM',
            'paint': {
                'circle-radius': 8,
                'circle-stroke-width': 2,
                'circle-color': 'red',
                'circle-stroke-color': 'white'
            }
        });
    });
	
map.addControl(
new MapboxDirections({
accessToken: mapboxgl.accessToken
}),
'top-left'
);
	
</script>

</body>
</html>
