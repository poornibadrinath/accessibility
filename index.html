<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Understanding Accessibility and Last mile connectivity! - Mapping Project</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Import Mapbox GL JS  -->
  <script src="https://api.tiles.mapbox.com/mapbox-gl-js/v2.6.1/mapbox-gl.js"></script>
  <link href="https://api.tiles.mapbox.com/mapbox-gl-js/v2.6.1/mapbox-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-directions/v4.1.0/mapbox-gl-directions.js"></script>
  <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-directions/v4.1.0/mapbox-gl-directions.css" type="text/css">

  <!-- Import Mapbox GL Draw -->
  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.0.9/mapbox-gl-draw.js"></script>
  <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.0.9/mapbox-gl-draw.css" type="text/css" />

  <!-- Import custom stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>


<body>

  <div id="menu1">

     <input id="ckyu1koq5001615pq10qss11j" type="radio" name="rtoggle" checked="checked">
    <label>Day</label>
      <input id="ckyvs9vi2003s14o4r353jqhh" type="radio" name="rtoggle" value="dark">
      <label for="dark-v10">Night</label>
   
   <!--<input id="ckyu1koq5001615pq10qss11j" type="radio" name="rtoggle" checked="checked">
    <label>Our first basemap</label>
    mapbox://styles/poorni-badrinath/ckyugychf001y14o0a03va5ki 
    mapbox://styles/poorni-badrinath/ckyvs9vi2003s14o4r353jqhh*/--> 

  </div>

  <!-- Create a container for the map -->
  <div id="map"></div>
  <nav id="menu"></nav>
  <div id="menu"></div>


  <!-- Create a container for the instructions and directions -->
  <div class="info-box">
    <p>
      Draw your preferred route using the draw tools on the top right corner. 
    </p>
    <div id="directions"></div>
  </div>

  <script>
    // Add your Mapbox access token
    mapboxgl.accessToken = 'pk.eyJ1IjoicG9vcm5pLWJhZHJpbmF0aCIsImEiOiJjanUwbmYzc3UwdDI3NGRtZ3kzMTltbWZpIn0.SB9PEksVcEwWvZJ9A7J9uA';

    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/poorni-badrinath/ckyu1koq5001615pq10qss11j',
      center: [11.564878, 48.1473645],
      zoom: 10.5
    });



    const draw = new MapboxDraw({
      // Instead of showing all the draw tools, show only the line string and delete tools
      displayControlsDefault: false,
      controls: {
        line_string: true,
        trash: true
      },
      // Set the draw mode to draw LineStrings by default
      defaultMode: 'draw_line_string',
      styles: [
        // Set the line style for the user-input coordinates
        {
          'id': 'gl-draw-line',
          'type': 'line',
          'filter': [
            'all',
            ['==', '$type', 'LineString'],
            ['!=', 'mode', 'static']
          ],
          'layout': {
            'line-cap': 'round',
            'line-join': 'round'
          },
          'paint': {
            'line-color': '#438EE4',
            'line-dasharray': [0.2, 2],
            'line-width': 1.5,
            'line-opacity': 0.6
          }
        },
        // Style the vertex point halos
        {
          'id': 'gl-draw-polygon-and-line-vertex-halo-active',
          'type': 'circle',
          'filter': [
            'all',
            ['==', 'meta', 'vertex'],
            ['==', '$type', 'Point'],
            ['!=', 'mode', 'static']
          ],
          'paint': {
            'circle-radius': 10,
            'circle-color': '#FFF'
          }
        },
        // Style the vertex points
        {
          'id': 'gl-draw-polygon-and-line-vertex-active',
          'type': 'circle',
          'filter': [
            'all',
            ['==', 'meta', 'vertex'],
            ['==', '$type', 'Point'],
            ['!=', 'mode', 'static']
          ],
          'paint': {
            'circle-radius': 6,
            'circle-color': '#438EE4'
          }
        }
      ]
    });

    // Add the draw tool to the map
    map.addControl(draw);

    // Add create, update, or delete actions
    map.on('draw.create', updateRoute);
    map.on('draw.update', updateRoute);
    map.on('draw.delete', removeRoute);

    // Use the coordinates you just drew to make the Map Matching API request
    function updateRoute() {
      removeRoute(); // Overwrite any existing layers

      const profile = 'walking'; // Set the profile

      // Get the coordinates
      const data = draw.getAll();
      const lastFeature = data.features.length - 1;
      const coords = data.features[lastFeature].geometry.coordinates;
      // Format the coordinates
      const newCoords = coords.join(';');
      // Set the radius for each coordinate pair to 25 meters
      const radius = coords.map(() => 25);
      getMatch(newCoords, radius, profile);
    }

    // Make a Map Matching request
    async function getMatch(coordinates, radius, profile) {
      // Separate the radiuses with semicolons
      const radiuses = radius.join(';');
      // Create the query
      const query = await fetch(
        `https://api.mapbox.com/matching/v5/mapbox/${profile}/${coordinates}?geometries=geojson&radiuses=${radiuses}&steps=true&access_token=${mapboxgl.accessToken}`, {
          method: 'GET'
        }
      );
      const response = await query.json();
      // Handle errors
      if (response.code !== 'Ok') {
        alert(
          `${response.code} - ${response.message}.\n\nFor more information: https://docs.mapbox.com/api/navigation/map-matching/#map-matching-api-errors`
        );
        return;
      }
      const coords = response.matchings[0].geometry;
      // Draw the route on the map
      addRoute(coords);
      getInstructions(response.matchings[0]);
    }

    function getInstructions(data) {
      // Target the sidebar to add the instructions
      const directions = document.getElementById('directions');
      let tripDirections = '';
      // Output the instructions for each step of each leg in the response object
      for (const leg of data.legs) {
        const steps = leg.steps;
        for (const step of steps) {
          tripDirections += `<li>${step.maneuver.instruction}</li>`;
        }
      }
      directions.innerHTML = `<p><strong>Trip duration: ${Math.floor(
          data.duration / 60
        )} min.</strong></p><ol>${tripDirections}</ol>`;
    }

    // Draw the Map Matching route as a new layer on the map
    function addRoute(coords) {
      // If a route is already loaded, remove it
      if (map.getSource('route')) {
        map.removeLayer('route');
        map.removeSource('route');
      } else {
        map.addLayer({
          'id': 'route',
          'type': 'line',
          'source': {
            'type': 'geojson',
            'data': {
              'type': 'Feature',
              'properties': {},
              'geometry': coords
            }
          },
          'layout': {
            'line-join': 'round',
            'line-cap': 'round'
          },
          'paint': {
            'line-color': '#006400',
            'line-width': 8,
            'line-opacity': 0.8
          }
        });
      }
    }

    // If the user clicks the delete draw button, remove the layer if it exists
    function removeRoute() {
      if (!map.getSource('route')) return;
      map.removeLayer('route');
      map.removeSource('route');
    }

// Wait until the map has finished loading.
map.on('load', () => {
      // Add a custom vector tileset source. This tileset contains
      // point features representing all footways in Munich.

      // Add the Steps vector tileset. Read more about
      // the structure of data in this tileset in the documentation:
      // https://docs.mapbox.com/vector-tiles/reference/mapbox-terrain-v2/
      map.addSource('steps', {
        type: 'vector',
        url: 'mapbox://poorni-badrinath.ckv9d1um40ape23nsylhvugpt-3qmsb'
      });
      map.addLayer({
        'id': 'steps',
        'type': 'line',
        'source': 'steps',
        'source-layer': 'stepsandramps',
        'layout': {
          // Make the layer visible by default.
          'visibility': 'none',
          'line-join': 'round',
          'line-cap': 'round'
        },
        'paint': {
          'line-color': '#D35400 ',
          'line-width': 2
        }
      });

      // Add the WheelchairAccess vector tileset. Read more about
      // the structure of data in this tileset in the documentation:
      // https://docs.mapbox.com/vector-tiles/reference/mapbox-terrain-v2/
      map.addSource('wheelchairyesfinal', {
        type: 'vector',
        url: 'mapbox://poorni-badrinath.89nzc3po'
      });
      map.addLayer({
        'id': 'wheelchair',
        'type': 'circle',
        'source': 'wheelchairyesfinal',
        'source-layer': 'wheelchairyesfinal',
        'layout': {
          // Make the layer visible by default.
          'visibility': 'none',

        },
        'paint': {
          'circle-radius': 2,
          'circle-color': '#7D3C98'
        }
      });
    });

    // After the last frame rendered before the map enters an "idle" state.
    map.on('idle', () => {
      // If these two layers were not added to the map, abort
      if (!map.getLayer('wheelchairyesfinal') || !map.getLayer('steps')) {
        return;
      }

      // Enumerate ids of the layers.
      const toggleableLayerIds = ['wheelchairyesfinal', 'steps'];

      // Set up the corresponding toggle button for each layer.
      for (const id of toggleableLayerIds) {
        // Skip layers that already have a button set up.
        if (document.getElementById(id)) {
          continue;
        }

        // Create a link.
        const link = document.createElement('a');
        link.id = id;
        link.href = '#';
        link.textContent = id;
        link.className = 'active';

        // Show or hide layer when the toggle is clicked.
        link.onclick = function(e) {
          const clickedLayer = this.textContent;
          e.preventDefault();
          e.stopPropagation();

          const visibility = map.getLayoutProperty(
            clickedLayer,
            'visibility'
          );

          // Toggle layer visibility by changing the layout object's visibility property.
          if (visibility === 'visible') {
            map.setLayoutProperty(clickedLayer, 'visibility', 'none');
            this.className = '';
          } else {
            this.className = 'active';
            map.setLayoutProperty(
              clickedLayer,
              'visibility',
              'visible'
            );
          }
        };

        const layers = document.getElementById('menu');
        layers.appendChild(link);
      }
    })

    map.addControl(
      new MapboxDirections({
        accessToken: mapboxgl.accessToken
      }),
      'bottom-right'
    );

    // Sandbox example how to keep data visible while changing background maps:
    // https://dev.to/dqunbp/effectively-switching-mapbox-gl-styles-1a3i

    const layerList = document.getElementById('menu1');
    const inputs = layerList.getElementsByTagName('input');

    for (const input of inputs) {
      input.onclick = (layer) => {
        const layerId = layer.target.id;
        map.setStyle('mapbox://styles/poorni-badrinath/' + layerId);
        // Old version grabbing basemaps from default Mapbox user: map.setStyle('mapbox://styles/mapbox/' + layerId);
      };
    }
  </script>
</body>

</html>
